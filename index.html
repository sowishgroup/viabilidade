<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./logo-sowish.png" />
    <link rel="apple-touch-icon" href="./logo-sowish.png" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0B1F3A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Sowish Viabilidade — Avalie a viabilidade do seu espaço clínico com base nas normas da vigilância sanitária." />
    <title>Sowish Viabilidade</title>
    <!-- URL do webhook n8n: se a variável VITE_N8N_WEBHOOK_URL sempre sumir no EasyPanel, coloque a URL aqui entre aspas (ex.: "https://n8n-n8n.84bvnc.easypanel.host/webhook/consulta-viabilidade") -->
    <script>window.__SOWISH_N8N_WEBHOOK_URL__ = "https://n8n-n8n.84bvnc.easypanel.host/webhook/consulta-viabilidade";</script>
    <style>
      /* Splash inicial: logo centralizada enquanto o app carrega (PWA / abertura no celular) */
      #sowish-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        background: linear-gradient(160deg, #0B1F3A 0%, #0d2847 50%, #0B1F3A 100%);
      }
      #sowish-splash .splash-logo {
        font-size: 1.75rem;
        font-weight: 700;
        color: #fff;
        letter-spacing: 0.05em;
      }
      #sowish-splash img {
        width: 120px;
        height: 120px;
        object-fit: contain;
      }
      #sowish-splash .splash-text {
        color: rgba(255,255,255,0.8);
        font-size: 0.875rem;
        margin: 0;
      }
      #sowish-splash .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(255,255,255,0.2);
        border-top-color: #fff;
        border-radius: 50%;
        animation: sowish-spin 0.8s linear infinite;
      }
      @keyframes sowish-spin { to { transform: rotate(360deg); } }
      #sowish-splash.loaded { display: none !important; }
    </style>
  </head>
  <body style="background-color:#0f172a;min-height:100vh;margin:0">
    <div id="sowish-splash" aria-hidden="true">
      <div class="splash-logo">Sowish</div>
      <img src="./logo-sowish.png" alt="Sowish" width="120" height="120" onerror="this.style.display='none'" />
      <div class="spinner"></div>
      <p class="splash-text">Carregando...</p>
    </div>
    <div id="root"></div>
    <script>
      (function() {
        function hideSplash() {
          var s = document.getElementById('sowish-splash');
          if (s) s.classList.add('loaded');
        }
        window.__sowishReady = hideSplash;
        document.addEventListener('DOMContentLoaded', function() {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(function() {})
          }
          setTimeout(hideSplash, 4000);
          setTimeout(function() {
            var root = document.getElementById('root');
            if (root && !root.hasChildNodes()) {
              hideSplash();
              root.innerHTML = '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:#0f172a;color:#e2e8f0;font-family:system-ui,sans-serif;text-align:center"><p style="margin-bottom:16px">O app não carregou.</p><p style="font-size:14px;color:#94a3b8;margin-bottom:24px">Recarregue a página ou verifique se o deploy está usando o build (Docker) e não o código-fonte.</p><button onclick="location.reload()" style="padding:10px 20px;border-radius:9999px;background:#0B1F3A;color:white;border:none;cursor:pointer;font-size:14px">Recarregar</button></div>';
            }
          }, 6000);
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
